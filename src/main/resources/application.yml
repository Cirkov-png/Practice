security:
  user:
    name: ${SECURITY_USER_NAME:user}
    password: ${SECURITY_USER_PASSWORD:user}
  manager:
    name: ${SECURITY_MANAGER_NAME:manager}
    password: ${SECURITY_MANAGER_PASSWORD:manager}

---
spring:
  config:
    activate:
      on-profile: keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/lms-realm

---
spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5433/lms
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:lms}
    password: ${DB_PASSWORD:lms}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@lms.practice.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  model-and-view-parameters-as-fields: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}

course:
  reminder:
    cron: ${COURSE_REMINDER_CRON:0 0 8 * * *}

logging:
  level:
    root: INFO
    com.practice.lms: DEBUG
    org.hibernate.SQL: DEBUG
