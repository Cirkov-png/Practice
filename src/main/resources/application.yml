spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:lms;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@lms.practice.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  model-and-view-parameters-as-fields: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}

course:
  reminder:
    cron: ${COURSE_REMINDER_CRON:0 0 8 * * *}

logging:
  level:
    root: INFO
    com.practice.lms: DEBUG
    org.hibernate.SQL: DEBUG
