databaseChangeLog:
  - changeSet:
      id: 005-create-enrollments
      author: arseniy.bsuir@gmail.com
      changes:
        - createTable:
            tableName: enrollments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_enrollments_student
                    referencedTableName: students
                    referencedColumnNames: id
              - column:
                  name: course_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_enrollments_course
                    referencedTableName: courses
                    referencedColumnNames: id
              - column:
                  name: coins_paid
                  type: DECIMAL(19, 4)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: enrollments
            columnNames: student_id, course_id
            constraintName: uq_enrollments_student_course
