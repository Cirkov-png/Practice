databaseChangeLog:
  - changeSet:
      id: 002-create-course
      author: me
      changes:
        - createTable:
            tableName: courses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: start_date
                  type: DATE

              - column:
                  name: price
                  type: INT