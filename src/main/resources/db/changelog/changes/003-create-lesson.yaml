databaseChangeLog:
  - changeSet:
      id: 003-create-lesson
      author: me
      changes:
        - createTable:
            tableName: lesson
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: title
                  type: VARCHAR(255)

              - column:
                  name: content
                  type: TEXT

              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false