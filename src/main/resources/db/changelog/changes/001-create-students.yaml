databaseChangeLog:
  - changeSet:
      id: 001-create-students
      author: arseniy.bsuir@gmail.com
      changes:
        - createTable:
            tableName: students
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: date_of_birth
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: coins
                  type: DECIMAL(19, 4)
                  constraints:
                    nullable: false