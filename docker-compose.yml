services:
  postgres:
    image: postgres:17
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: ${DB_USERNAME:-lms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lms}
    ports:
      - "5433:5432"
    volumes:
      - lms-postgres-data:/var/lib/postgresql/data

  keycloak:
   image: quay.io/keycloak/keycloak:24.0
   container_name: lms-keycloak
   environment:
    KEYCLOAK_ADMIN: admin
    KEYCLOAK_ADMIN_PASSWORD: admin
   ports:
    - "8081:8080"
   command: start-dev

volumes:
  lms-postgres-data:
